<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>404 — Page introuvable · FRK-France</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0a0a0a;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow: hidden;
      }

      /* Grain */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 600px;
      }

      .label {
        font-size: 10px;
        font-family: ui-monospace, monospace;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin-bottom: 2rem;
      }

      .code {
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 300;
        letter-spacing: -0.04em;
        line-height: 1;
        color: #fff;
        margin-bottom: 1.5rem;
        opacity: 0.08;
        user-select: none;
      }

      h1 {
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin-bottom: 1rem;
        color: #fff;
      }

      p {
        font-size: 0.9rem;
        color: rgba(255,255,255,0.4);
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        border: 1px solid rgba(255,255,255,0.25);
        color: #fff;
        padding: 0.8rem 1.6rem;
        border-radius: 6px;
        text-decoration: none;
        font-size: 12px;
        font-family: ui-monospace, monospace;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        transition: background 0.3s, border-color 0.3s;
      }

      .btn:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.5);
      }

      .timer {
        margin-top: 2rem;
        font-size: 10px;
        font-family: ui-monospace, monospace;
        letter-spacing: 0.15em;
        color: rgba(255,255,255,0.2);
      }

      .timer span {
        color: #f97316;
      }

      .brand {
        position: fixed;
        top: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: rgba(255,255,255,0.6);
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <span class="brand">FRK-France</span>

    <div class="container">
      <p class="label">[ Erreur ] · Page introuvable</p>
      <div class="code">404</div>
      <h1>Cette page n'existe pas.</h1>
      <p>La page que vous cherchez a peut-être été déplacée,<br />renommée ou n'a jamais existé.</p>
      <a href="/site_dino/" class="btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Retour à l'accueil
      </a>
      <p class="timer">Redirection automatique dans <span id="count">8</span>s</p>
    </div>

    <script>
      let n = 8;
      const el = document.getElementById("count");
      const iv = setInterval(() => {
        n--;
        el.textContent = n;
        if (n <= 0) { clearInterval(iv); window.location.href = "/site_dino/"; }
      }, 1000);
    </script>
  </body>
</html>
